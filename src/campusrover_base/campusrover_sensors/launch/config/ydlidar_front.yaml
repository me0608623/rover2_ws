ydlidar_front_node:
  ros__parameters:
    port: /dev/ydlidar_front
    frame_id: ydlidar_front_link
    ignore_array: ""
    baudrate: 512000
    lidar_type: 1
    device_type: 0
    sample_rate: 18
    abnormal_check_count: 4
    fixed_resolution: true
    reversion: true
    inverted: true
    auto_reconnect: true
    isSingleChannel: false
    intensity: false
    support_motor_dtr: false
    angle_max: 180.0
    angle_min: -180.0
    range_max: 32.0
    range_min: 0.01
    frequency: 10.0
    invalid_range_is_inf: false
